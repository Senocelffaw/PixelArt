<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/css.css">
    <title>Document</title>
</head>
<body>

    <div class=" d-flex bg-dark ">
        <!------Left Sidebar-->
        <div id="left-side-bar" class="bg-secondary min-vh-100 col-2">
            <div class="wrapper m-auto col-12">
                <button id="clear" class="btn btn-primary col-12 mt-3">Clear Canvas</button>
            </div>
        </div>

        <!------Canvas----->
        <div id="canvas" class="d-flex align-items-center min-vh-100">
            <div>
                <canvas id="myCanvas" width="300" height="150">Your browser does not support the HTML5 canvas tag.</canvas>
            </div>
        </div>

        <!------Right Sidebar-->
        <div id="right-side-bar" class="bg-secondary min-vh-100 col-2">

        </div>
    </div>

    <script src="../js/jquery.min.js"></script>
    <script src="../js/popper.min.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/app.js"></script>
</body>
</html>
